<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AINavHub - AI Tools Navigator</title>
  <meta name="description" content="AINavHub：精选 AI 工具导航，支持分类筛选与搜索，持续更新。" />
  <link rel="icon" type="image/png" href="./logo.png" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="topbar">
        <div class="brand-wrap">
          <img src="./logo.png" alt="AINavHub logo" class="brand-logo" />
          <div>
            <h1 id="siteTitle">AINavHub</h1>
            <p id="siteSubtitle" class="subtitle">Find useful AI tools fast.</p>
          </div>
        </div>

        <div class="top-actions">
          <a id="submitEntry" class="submit-entry" href="https://github.com/1225067131-dotcom/ainavhub/issues/new" target="_blank" rel="noopener noreferrer">提交工具</a>
          <button id="langToggle" class="lang-toggle" type="button">EN</button>
        </div>
      </div>

      <section class="hero" id="heroSection">
        <h2 id="heroTitle">发现好用 AI 工具，一站直达</h2>
        <p id="heroDesc">精选、分类、可搜索。每天节省你找工具的时间。</p>
        <div class="hero-actions">
          <a href="#toolGrid" class="btn btn-primary" id="btnExplore">浏览工具</a>
          <a href="https://github.com/1225067131-dotcom/ainavhub/issues/new" target="_blank" rel="noopener noreferrer" class="btn btn-ghost" id="btnSubmit">提交工具</a>
        </div>
      </section>

      <div class="controls">
        <input id="searchInput" type="text" placeholder="搜索工具名、描述或标签..." />
        <select id="categorySelect"></select>
      </div>
    </div>
  </header>

  <main class="container">
    <section class="stats-cards" id="statsCards">
      <article class="metric"><span id="mTotalLabel">总工具</span><strong id="mTotal">0</strong></article>
      <article class="metric"><span id="mFreeLabel">免费/部分免费</span><strong id="mFree">0</strong></article>
      <article class="metric"><span id="mCatsLabel">分类数</span><strong id="mCats">0</strong></article>
    </section>

    <section id="stats" class="stats"></section>
    <section id="toolGrid" class="tool-grid"></section>
    <p id="emptyState" class="empty hidden">没有找到匹配工具，换个关键词试试。</p>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner">
      <p>© <span id="year"></span> AINavHub</p>
      <p><span id="submitLabel">提交工具</span>：<a href="https://github.com/1225067131-dotcom/ainavhub/issues/new" id="submitLink" target="_blank" rel="noopener noreferrer">GitHub Issue</a></p>
    </div>
  </footer>

  <script>
    const toolGrid = document.getElementById('toolGrid');
    const searchInput = document.getElementById('searchInput');
    const categorySelect = document.getElementById('categorySelect');
    const stats = document.getElementById('stats');
    const emptyState = document.getElementById('emptyState');
    const langToggle = document.getElementById('langToggle');
    const submitLabel = document.getElementById('submitLabel');
    const submitEntry = document.getElementById('submitEntry');
    const siteSubtitle = document.getElementById('siteSubtitle');

    const heroTitle = document.getElementById('heroTitle');
    const heroDesc = document.getElementById('heroDesc');
    const btnExplore = document.getElementById('btnExplore');
    const btnSubmit = document.getElementById('btnSubmit');
    const mTotalLabel = document.getElementById('mTotalLabel');
    const mFreeLabel = document.getElementById('mFreeLabel');
    const mCatsLabel = document.getElementById('mCatsLabel');
    const mTotal = document.getElementById('mTotal');
    const mFree = document.getElementById('mFree');
    const mCats = document.getElementById('mCats');

    document.getElementById('year').textContent = new Date().getFullYear();

    const I18N = {
      zh: {
        langBtn: 'EN',
        subtitle: '快速找到好用 AI 工具。',
        heroTitle: '发现好用 AI 工具，一站直达',
        heroDesc: '精选、分类、可搜索。每天节省你找工具的时间。',
        explore: '浏览工具',
        searchPlaceholder: '搜索工具名、描述或标签...',
        categories: ['全部', '对话', '绘图', '视频', '编程', '办公', '学习'],
        stats: (n) => `当前显示 ${n} 个工具`,
        empty: '没有找到匹配工具，换个关键词试试。',
        visit: '访问网站',
        submit: '提交工具',
        totalLabel: '总工具',
        freeLabel: '免费/部分免费',
        catsLabel: '分类数',
        free: '免费',
        freemium: '部分免费',
        paid: '付费',
      },
      en: {
        langBtn: '中',
        subtitle: 'Find useful AI tools fast.',
        heroTitle: 'Discover useful AI tools in one place',
        heroDesc: 'Curated, categorized, searchable — save time every day.',
        explore: 'Explore Tools',
        searchPlaceholder: 'Search by name, description, or tags...',
        categories: ['All', 'Chat', 'Image', 'Video', 'Coding', 'Office', 'Learning'],
        stats: (n) => `${n} tools shown`,
        empty: 'No tools found. Try another keyword.',
        visit: 'Visit Website',
        submit: 'Submit Tool',
        totalLabel: 'Total Tools',
        freeLabel: 'Free/Freemium',
        catsLabel: 'Categories',
        free: 'Free',
        freemium: 'Freemium',
        paid: 'Paid',
      }
    };

    const categoryMap = {
      对话: 'Chat',
      绘图: 'Image',
      视频: 'Video',
      编程: 'Coding',
      办公: 'Office',
      学习: 'Learning'
    };

    const reverseCategoryMap = Object.fromEntries(Object.entries(categoryMap).map(([k, v]) => [v, k]));

    let tools = [];
    let currentLang = 'zh';

    function localizedCategory(zhCategory) {
      return currentLang === 'zh' ? zhCategory : (categoryMap[zhCategory] || zhCategory);
    }

    function toZhCategory(localCategory) {
      if (currentLang === 'zh') return localCategory;
      return reverseCategoryMap[localCategory] || localCategory;
    }

    function badgeClass(freeType) {
      if (freeType === '免费') return 'badge free';
      if (freeType === '部分免费') return 'badge freemium';
      return 'badge paid';
    }

    function localizedFreeType(freeType) {
      if (currentLang === 'zh') return freeType;
      if (freeType === '免费') return I18N.en.free;
      if (freeType === '部分免费') return I18N.en.freemium;
      return I18N.en.paid;
    }

    function updateMetrics(allTools) {
      mTotal.textContent = allTools.length;
      mFree.textContent = allTools.filter(t => t.freeType === '免费' || t.freeType === '部分免费').length;
      mCats.textContent = new Set(allTools.map(t => t.category)).size;
    }

    function setCategoryOptions() {
      const labels = I18N[currentLang].categories;
      const prevSelected = categorySelect.value;
      categorySelect.innerHTML = labels.map(label => `<option value="${label}">${label}</option>`).join('');
      if (labels.includes(prevSelected)) categorySelect.value = prevSelected;
      else categorySelect.value = labels[0];
    }

    function render(list) {
      toolGrid.innerHTML = '';

      if (!list.length) emptyState.classList.remove('hidden');
      else emptyState.classList.add('hidden');

      list.forEach(tool => {
        const card = document.createElement('article');
        card.className = 'card';

        const tags = (tool.tags || []).map(t => `<span class="tag">${t}</span>`).join('');

        card.innerHTML = `
          <div class="card-top">
            <h3>${tool.name}</h3>
            <span class="${badgeClass(tool.freeType)}">${localizedFreeType(tool.freeType)}</span>
          </div>
          <p class="desc">${tool.description}</p>
          <div class="meta">
            <span class="cat">${localizedCategory(tool.category)}</span>
          </div>
          <div class="tags">${tags}</div>
          <a class="visit" href="${tool.url}" target="_blank" rel="noopener noreferrer">${I18N[currentLang].visit}</a>
        `;
        toolGrid.appendChild(card);
      });

      stats.textContent = I18N[currentLang].stats(list.length);
    }

    function filterTools() {
      const keyword = searchInput.value.trim().toLowerCase();
      const selectedCategory = categorySelect.value;
      const allLabel = I18N[currentLang].categories[0];
      const selectedZhCategory = toZhCategory(selectedCategory);

      const filtered = tools.filter(tool => {
        const matchCategory = selectedCategory === allLabel || tool.category === selectedZhCategory;
        const matchKeyword =
          tool.name.toLowerCase().includes(keyword) ||
          tool.description.toLowerCase().includes(keyword) ||
          (tool.tags || []).join(' ').toLowerCase().includes(keyword);
        return matchCategory && matchKeyword;
      });

      render(filtered);
    }

    function applyLanguage() {
      document.documentElement.lang = currentLang === 'zh' ? 'zh-CN' : 'en';
      const lang = I18N[currentLang];
      langToggle.textContent = lang.langBtn;
      siteSubtitle.textContent = lang.subtitle;
      heroTitle.textContent = lang.heroTitle;
      heroDesc.textContent = lang.heroDesc;
      btnExplore.textContent = lang.explore;
      btnSubmit.textContent = lang.submit;
      searchInput.placeholder = lang.searchPlaceholder;
      emptyState.textContent = lang.empty;
      submitLabel.textContent = lang.submit;
      submitEntry.textContent = lang.submit;
      mTotalLabel.textContent = lang.totalLabel;
      mFreeLabel.textContent = lang.freeLabel;
      mCatsLabel.textContent = lang.catsLabel;
      setCategoryOptions();
      filterTools();
    }

    async function init() {
      try {
        const res = await fetch('./tools.json');
        tools = await res.json();
        updateMetrics(tools);
        applyLanguage();
      } catch (err) {
        toolGrid.innerHTML = '<p>Data load failed. Please check tools.json.</p>';
        console.error(err);
      }
    }

    searchInput.addEventListener('input', filterTools);
    categorySelect.addEventListener('change', filterTools);
    langToggle.addEventListener('click', () => {
      currentLang = currentLang === 'zh' ? 'en' : 'zh';
      applyLanguage();
    });

    init();
  </script>
</body>
</html>
