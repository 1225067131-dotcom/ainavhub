<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Navify AI - AI Tools Navigator</title>
  <meta name="description" content="Navify AI精选 AI 工具的导航，支持分类筛选与智能搜索" />
  <link rel="icon" type="image/png" href="./logo.png?v=2" />
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container">
      <div class="topbar">
        <div class="brand-wrap">
          <img src="./logo.png?v=2" alt="Navify AI logo" class="brand-logo" />
          <div><h1>Navify <span class="brand-ai">AI</span></h1></div>
        </div>
        <div class="top-actions">
          <a id="aboutEntry" class="submit-entry" href="./about.html">关于</a>
          <a id="submitEntry" class="submit-entry" href="https://github.com/1225067131-dotcom/ainavhub/issues/new" target="_blank" rel="noopener noreferrer">提交工具</a>
          <button id="langToggle" class="lang-toggle" type="button">EN</button>
        </div>
      </div>

      <section class="hero">
        <h2 id="heroTitle" class="hero-main">让想法找到<span class="slogan-accent">方向</span></h2>
        <p id="heroSub" class="hero-sub"></p>
      </section>

      <div class="controls controls-3">
        <div class="search-wrap">
          <input id="searchInput" type="text" placeholder="按名称、描述、标签搜索..." />
          <button id="clearSearchBtn" class="clear-search-btn hidden" type="button">清除</button>
        </div>
      </div>

      <div id="categoryTagRow" class="category-tags">
        <button class="category-tag-btn" data-key="Art" data-i18n-key="art" type="button">Art</button>
        <button class="category-tag-btn" data-key="Browser Extensions" data-i18n-key="browserExtensions" type="button">Browser Extensions</button>
        <button class="category-tag-btn" data-key="Data" data-i18n-key="data" type="button">Data</button>
        <button class="category-tag-btn" data-key="Design" data-i18n-key="design" type="button">Design</button>
        <button class="category-tag-btn" data-key="Development" data-i18n-key="development" type="button">Development</button>
        <button class="category-tag-btn" data-key="Education" data-i18n-key="education" type="button">Education</button>
        <button class="category-tag-btn" data-key="Entertainment" data-i18n-key="entertainment" type="button">Entertainment</button>
        <button class="category-tag-btn" data-key="Finance" data-i18n-key="finance" type="button">Finance</button>
        <button class="category-tag-btn" data-key="Games" data-i18n-key="games" type="button">Games</button>
        <button class="category-tag-btn" data-key="Generative Art" data-i18n-key="generativeArt" type="button">Generative Art</button>
        <button class="category-tag-btn" data-key="More" data-i18n-key="more" data-toggle="more" type="button">More</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Marketing" data-i18n-key="marketing" type="button">Marketing</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Messaging" data-i18n-key="messaging" type="button">Messaging</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Music" data-i18n-key="music" type="button">Music</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="News" data-i18n-key="news" type="button">News</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Other" data-i18n-key="other" type="button">Other</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Research" data-i18n-key="research" type="button">Research</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="SEO" data-i18n-key="seo" type="button">SEO</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Shopping" data-i18n-key="shopping" type="button">Shopping</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Social" data-i18n-key="social" type="button">Social</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Software Development" data-i18n-key="softwareDevelopment" type="button">Software Development</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Tasks" data-i18n-key="tasks" type="button">Tasks</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Text" data-i18n-key="text" type="button">Text</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Travel" data-i18n-key="travel" type="button">Travel</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="User Experience" data-i18n-key="userExperience" type="button">User Experience</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Wireframing" data-i18n-key="wireframing" type="button">Wireframing</button>
        <button class="category-tag-btn category-tag-extra hidden" data-key="Writing" data-i18n-key="writing" type="button">Writing</button>
      </div>
    </div>
  </header>

  <main class="container">
    <p id="firstVisitHint" class="first-visit-hint hidden">点击标签或搜索快速定位</p>
    <div id="recentToolsRow" class="category-tags hidden"></div>

    <section class="list-toolbar">
      <div class="stats-row">
        <select id="priceFilter" class="price-filter"></select>
        <div id="stats" class="stats"></div>
      </div>
      <div class="view-controls">
        <div class="view-segment" role="group" aria-label="Layout switch">
          <button id="viewGridBtn" class="view-btn active" title="Grid view" aria-label="Grid view">▦</button>
          <button id="viewListBtn" class="view-btn" title="List view" aria-label="List view">≡</button>
        </div>
        <select id="sortInline"></select>
      </div>
    </section>

    <section id="toolGrid" class="tool-grid"></section>
    <div id="pagination" class="stats"></div>
    <p id="emptyState" class="empty hidden">没有找到匹配工具，请尝试其它关键词。</p>
    <div id="emptyGuide" class="empty-guide hidden"></div>
  </main>

  <footer class="site-footer">
    <div class="container footer-inner footer-center">
      <p>© 2025 Navify AI. All rights reserved.</p>
      <p><a href="mailto:navifyai@foxmail.com">navifyai@foxmail.com</a></p>
    </div>
  </footer>

  <button id="toTopBtn" class="to-top" type="button" aria-label="Back to top">↑</button>

  <script src="./i18n.js" defer></script>
  <script src="./locales.js" defer></script>
  <script src="./main.js" defer></script>
</body>
</html>
